name: Nightly Fuzz

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      fuzz_n:
        description: "Number of fuzz plans"
        default: "1000000"

jobs:
  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Deep adversarial sweep (ADR-002): same harness as CI, 10^6 plans.
      - name: Run fuzz harness at nightly scale
        env:
          NEXUS_FUZZ_N: ${{ github.event.inputs.fuzz_n || '1000000' }}
        run: python -m unittest discover -s platform/tests -t platform -p "test_fuzz_harness.py" -v
